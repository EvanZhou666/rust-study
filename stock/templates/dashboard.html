{% extends "base.html" %}
{% block title %}{{ title }}{% endblock title %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="h3 mb-0">{{ title }}</h1>
    <button class="btn btn-outline-primary btn-sm"
            hx-get="/api/refresh"
            hx-target="#refresh-status"
            hx-indicator="#refresh-spinner"
            hx-swap="innerHTML">
        <span id="refresh-spinner" class="htmx-indicator spinner-border spinner-border-sm me-1"></span>
        刷新数据
    </button>
</div>

<div id="refresh-status"></div>

<div class="table-responsive">
    <table class="table table-hover align-middle">
        <thead class="table-light">
            <tr>
                <th>商品名称</th>
                <th>最新价格</th>
                <th>涨跌幅</th>
                <th>趋势</th>
                <th></th>
            </tr>
        </thead>
        <tbody>
            {% for c in commodities %}
            <tr>
                <td class="fw-semibold">{{ c.name }}</td>
                <td>{{ c.price }} <small class="text-muted">{{ c.unit }}</small></td>
                <td><span class="{{ c.change_class }}">{{ c.change_str }}</span></td>
                <td><span class="{{ c.trend_class }}">{{ c.trend_label }}</span></td>
                <td><a href="/commodity/{{ c.code }}" class="btn btn-sm btn-outline-secondary">详情</a></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

<div class="text-muted small mt-3">
    上次采集时间: {{ last_collected }}
</div>
{% endblock content %}
